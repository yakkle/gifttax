<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GiftTax - 해외주식 증여 금액 계산기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>GiftTax</h1>
            <p>해외주식 증여 금액 계산기</p>
            <p class="disclaimer-short">본 서비스의 계산 결과는 참고용입니다. 정확한 신고는 세무 전문가와 상담하세요.</p>
        </header>

        <main>
            <form id="gift-form">
                <div class="form-group">
                    <label for="gift-date">증여일</label>
                    <input type="date" id="gift-date" name="gift-date" required>
                </div>

                <div class="form-group">
                    <label>증여 주식</label>
                    <div id="stocks-container">
                        <div class="stock-row">
                            <input type="text" name="ticker" placeholder="종목코드 (예: AAPL)" required>
                            <input type="number" name="qty" placeholder="수량" min="1" required>
                            <select name="currency">
                                <option value="USD" selected>USD</option>
                                <option value="EUR">EUR</option>
                                <option value="JPY">JPY</option>
                                <option value="GBP">GBP</option>
                            </select>
                            <button type="button" class="btn-remove" onclick="removeStock(this)">×</button>
                        </div>
                    </div>
                    <button type="button" class="btn-add" onclick="addStock()">+ 주식 추가</button>
                </div>

                <button type="submit" class="btn-submit">계산하기</button>
            </form>

            <div id="result" class="hidden">
                <h2>계산 결과</h2>
                <div id="result-content"></div>

                <div class="disclaimer-main" role="note" aria-label="법적 고지사항">
                    <strong>법적 고지사항</strong>
                    <p>본 계산 결과와 생성된 PDF는 참고용 자료입니다.<br>
                    실제 증여세 신고 시 적용되는 평가액은 세법 규정 및 과세 당국의 판단에 따라 달라질 수 있습니다.<br>
                    정확한 신고를 위해 세무 전문가와 반드시 상담하시기 바랍니다.</p>
                </div>

                <div class="download-buttons">
                    <button id="btn-gift-pdf" class="btn-download">계산 증빙 PDF</button>
                    <button id="btn-rate-pdf" class="btn-download">매매기준환율 PDF</button>
                    <a id="btn-smbs" class="btn-download btn-smbs" href="#" target="_blank" rel="noopener">smbs.biz에서 환율 출력</a>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
